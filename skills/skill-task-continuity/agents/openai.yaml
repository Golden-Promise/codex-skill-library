interface:
  display_name: "Skill Task Continuity"
  short_description: "Explain and bootstrap the long-task continuity suite without replacing the atomic skills"
  default_prompt: "Use $skill-task-continuity when the task is explicitly about the long-task continuity suite itself: explain how `skill-context-keeper`, `skill-phase-gate`, and `skill-handoff-summary` compose, bootstrap downstream templates such as AGENTS.md and .agent-state/*.md when requested, and keep the templates scoped to downstream consumer repos rather than the public skill library root."
