interface:
  display_name: "Skill Phase Gate"
  short_description: "Add meaningful preflight or postflight checkpoints to substantial coding work"
  default_prompt: "Use $skill-phase-gate when the task needs a meaningful checkpoint before or after execution. Start from the task at hand, choose either a compact preflight or postflight gate, keep the output checklist-oriented, and avoid using this package for trivial one-line edits, pure explanation requests, long-term state ownership, or final handoff generation."
