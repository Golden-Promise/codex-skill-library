interface:
  display_name: "Skill Context Keeper"
  short_description: "Maintain trusted root-task state without taking over subtask state, packets, gates, or handoffs"
  default_prompt: "Use $skill-context-keeper when the task needs a reliable root-state refresh: reconstruct the current root task context, keep facts separate from assumptions and decisions, update a downstream artifact such as .agent-state/root/TASK_STATE.md, capture compression or archive notes when stale detail should move out of the active summary, and avoid taking over subtask-local state, packet compression, phase gates, or final handoff notes."
